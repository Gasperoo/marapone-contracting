<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.055"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#222222"/>
    </linearGradient>
    <linearGradient id="statbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Construction crosshatch accent top right -->
  <line x1="800" y1="0" x2="1080" y2="280" stroke="#f97316" stroke-width="1" opacity="0.07"/>
  <line x1="880" y1="0" x2="1080" y2="200" stroke="#f97316" stroke-width="1" opacity="0.05"/>
  <line x1="960" y1="0" x2="1080" y2="120" stroke="#f97316" stroke-width="1" opacity="0.04"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="1080" height="72" fill="#232323"/>
  <rect x="0" y="68" width="1080" height="4" fill="#f97316"/>
  <text x="72" y="44" font-family="'DM Mono', 'Courier New', monospace" font-size="18" fill="#f97316" letter-spacing="4">// CONSTRUCTION INTELLIGENCE</text>
  <text x="980" y="44" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#a0a0a0" text-anchor="end" letter-spacing="2">WEEK 01</text>

  <!-- Main headline -->
  <text x="72" y="190" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="74" fill="#e8e8e8" letter-spacing="3">HOW LONG DOES YOUR TEAM</text>
  <text x="72" y="268" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="74" fill="#e8e8e8" letter-spacing="3">SPEND ON</text>
  <text x="72" y="346" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="74" fill="#f97316" letter-spacing="3">BLUEPRINT REVIEW?</text>

  <!-- Orange rule -->
  <rect x="72" y="368" width="500" height="3" fill="#f97316" rx="1.5"/>

  <!-- Stat cards -->
  <!-- Card 1 -->
  <rect x="72" y="400" width="920" height="130" rx="6" fill="#2e2e2e"/>
  <rect x="72" y="400" width="8" height="130" fill="#f97316" rx="4"/>
  <rect x="72" y="400" width="920" height="130" rx="6" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <text x="116" y="452" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="62" fill="#f97316" letter-spacing="2">4–6 HOURS</text>
  <text x="116" y="480" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" letter-spacing="1">per project blueprint review</text>
  <!-- Progress bar -->
  <rect x="116" y="498" width="820" height="6" fill="#232323" rx="3"/>
  <rect x="116" y="498" width="680" height="6" fill="url(#statbar)" rx="3"/>

  <!-- Card 2 -->
  <rect x="72" y="552" width="920" height="130" rx="6" fill="#2e2e2e"/>
  <rect x="72" y="552" width="8" height="130" fill="#f97316" rx="4"/>
  <rect x="72" y="552" width="920" height="130" rx="6" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <text x="116" y="604" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="62" fill="#f97316" letter-spacing="2">23%</text>
  <text x="244" y="604" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="40" fill="#e8e8e8" letter-spacing="2"> OF RFIs MISSED</text>
  <text x="116" y="632" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" letter-spacing="1">go unanswered past deadline</text>
  <rect x="116" y="650" width="820" height="6" fill="#232323" rx="3"/>
  <rect x="116" y="650" width="400" height="6" fill="url(#statbar)" rx="3"/>

  <!-- Card 3 -->
  <rect x="72" y="704" width="920" height="130" rx="6" fill="#2e2e2e"/>
  <rect x="72" y="704" width="8" height="130" fill="#f97316" rx="4"/>
  <rect x="72" y="704" width="920" height="130" rx="6" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <text x="116" y="756" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="62" fill="#f97316" letter-spacing="2">1 IN 4</text>
  <text x="116" y="784" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" letter-spacing="1">bids miss a critical spec</text>
  <rect x="116" y="802" width="820" height="6" fill="#232323" rx="3"/>
  <rect x="116" y="802" width="280" height="6" fill="url(#statbar)" rx="3"/>

  <!-- CTA section -->
  <rect x="72" y="864" width="920" height="72" rx="6" fill="#f97316" opacity="0.1"/>
  <rect x="72" y="864" width="4" height="72" fill="#f97316" rx="2"/>
  <text x="100" y="894" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#e8e8e8" letter-spacing="0.5">What if AI reviewed it in</text>
  <text x="100" y="920" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="34" fill="#f97316" letter-spacing="2">UNDER 60 MINUTES?</text>

  <!-- Handle -->
  <text x="1008" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
</svg>
