<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="leftcard" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a1a1a"/>
      <stop offset="100%" style="stop-color:#2e2e2e"/>
    </linearGradient>
    <linearGradient id="rightcard" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e2e2e"/>
      <stop offset="100%" style="stop-color:#1f2a1a"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1080" height="6" fill="#f97316"/>

  <!-- Shield icon area top center -->
  <polygon points="540,80 620,110 620,180 540,210 460,180 460,110" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0.6"/>
  <text x="540" y="160" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="48" fill="#f97316" text-anchor="middle" letter-spacing="1">✓</text>

  <!-- Main headline -->
  <text x="540" y="272" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="64" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">YOUR DOCUMENTS</text>
  <text x="540" y="340" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="64" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">NEVER LEAVE</text>
  <text x="540" y="408" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="64" fill="#f97316" text-anchor="middle" letter-spacing="3">YOUR NETWORK.</text>

  <!-- Sub -->
  <text x="540" y="454" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">Most AI tools process your data on their servers. We don't.</text>

  <!-- Divider line with label -->
  <rect x="72" y="480" width="440" height="1.5" fill="#2e2e2e"/>
  <text x="540" y="487" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">VS.</text>
  <rect x="568" y="480" width="440" height="1.5" fill="#2e2e2e"/>

  <!-- Two column comparison -->
  <!-- LEFT card: THEIRS -->
  <rect x="72" y="502" width="434" height="390" rx="8" fill="#2a1a1a"/>
  <rect x="72" y="502" width="434" height="390" rx="8" fill="none" stroke="#c0392b" stroke-width="1" opacity="0.4"/>
  <rect x="72" y="502" width="434" height="50" rx="8" fill="#c0392b" opacity="0.2"/>
  <text x="289" y="534" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="30" fill="#c0392b" text-anchor="middle" letter-spacing="4">THEIRS</text>

  <text x="104" y="592" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0">✗  Cloud-processed</text>
  <text x="104" y="638" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0">✗  Data stored externally</text>
  <text x="104" y="684" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0">✗  Terms can change</text>
  <text x="104" y="730" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0">✗  You're the product</text>
  <text x="104" y="776" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0">✗  Monthly fees forever</text>
  <text x="104" y="848" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#c0392b" letter-spacing="2">RENTING</text>

  <!-- RIGHT card: OURS -->
  <rect x="574" y="502" width="434" height="390" rx="8" fill="#1a2a1a"/>
  <rect x="574" y="502" width="434" height="390" rx="8" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
  <rect x="574" y="502" width="434" height="50" rx="8" fill="#f97316" opacity="0.2"/>
  <text x="791" y="534" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="30" fill="#f97316" text-anchor="middle" letter-spacing="4">OURS</text>

  <text x="606" y="592" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#e8e8e8">✓  Runs on your hardware</text>
  <text x="606" y="638" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#e8e8e8">✓  Zero external calls</text>
  <text x="606" y="684" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#e8e8e8">✓  You own everything</text>
  <text x="606" y="730" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#e8e8e8">✓  One-time fee</text>
  <text x="606" y="776" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#e8e8e8">✓  Privacy by design</text>
  <text x="606" y="848" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#f97316" letter-spacing="2">OWNING</text>

  <!-- Handle -->
  <text x="1008" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
  <text x="72" y="1040" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">MARAPONE.COM</text>
</svg>
