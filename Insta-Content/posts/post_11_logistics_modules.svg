<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Right accent bar -->
  <rect x="1072" y="0" width="8" height="1080" fill="#f97316"/>

  <!-- Top label -->
  <text x="540" y="68" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="4">// LOGISTICS AI SUITE</text>

  <!-- Main headline -->
  <text x="540" y="150" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">WHAT YOUR</text>
  <text x="540" y="226" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#f97316" text-anchor="middle" letter-spacing="3">LOGISTICS AI</text>
  <text x="540" y="302" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">DOES.</text>

  <rect x="190" y="320" width="700" height="3" fill="#f97316" rx="1.5"/>

  <!-- 4 module cards horizontal layout -->
  <!-- Card 1 -->
  <rect x="72" y="346" width="444" height="200" rx="8" fill="#2e2e2e"/>
  <rect x="72" y="346" width="444" height="200" rx="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="510" y="346" width="6" height="200" fill="#f97316" rx="4"/>
  <rect x="90" y="366" width="148" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="164" y="386" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">MODULE 01</text>
  <text x="100" y="424" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="2">DOCUMENT AUDIT</text>
  <text x="100" y="455" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">BOLs, PODs, customs</text>
  <text x="100" y="478" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">reviewed in seconds.</text>
  <text x="100" y="522" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="1">→ Multi-doc cross-check</text>

  <!-- Card 2 -->
  <rect x="564" y="346" width="444" height="200" rx="8" fill="#2e2e2e"/>
  <rect x="564" y="346" width="444" height="200" rx="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="564" y="346" width="6" height="200" fill="#f97316" rx="4"/>
  <rect x="582" y="366" width="166" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="665" y="386" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">MODULE 02</text>
  <text x="592" y="424" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="2">INVOICE VERIFIER</text>
  <text x="592" y="455" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Catches freight overcharges</text>
  <text x="592" y="478" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">automatically.</text>
  <text x="592" y="522" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="1">→ Rate variance flagging</text>

  <!-- Card 3 -->
  <rect x="72" y="564" width="444" height="200" rx="8" fill="#2e2e2e"/>
  <rect x="72" y="564" width="444" height="200" rx="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="510" y="564" width="6" height="200" fill="#f97316" rx="4"/>
  <rect x="90" y="584" width="166" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="173" y="604" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">MODULE 03</text>
  <text x="100" y="642" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="2">COMPLIANCE CHECK</text>
  <text x="100" y="673" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Trade lane rules,</text>
  <text x="100" y="696" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">auto-reviewed.</text>
  <text x="100" y="740" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="1">→ HS code validation</text>

  <!-- Card 4 -->
  <rect x="564" y="564" width="444" height="200" rx="8" fill="#2e2e2e"/>
  <rect x="564" y="564" width="444" height="200" rx="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="564" y="564" width="6" height="200" fill="#f97316" rx="4"/>
  <rect x="582" y="584" width="148" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="656" y="604" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">MODULE 04</text>
  <text x="592" y="642" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="2">RISK SCORING</text>
  <text x="592" y="673" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Know before the</text>
  <text x="592" y="696" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">shipment lands.</text>
  <text x="592" y="740" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="1">→ Predictive delay flags</text>

  <!-- Bottom tagline -->
  <rect x="72" y="798" width="936" height="100" rx="6" fill="#232323"/>
