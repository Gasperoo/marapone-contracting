<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#232323"/>
    </linearGradient>
    <linearGradient id="ctabar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Orange triangle top right -->
  <polygon points="780,0 1080,0 1080,300" fill="#f97316" opacity="0.07"/>

  <!-- Top label -->
  <text x="540" y="68" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="4">// LIMITED OFFER</text>

  <!-- FREE badge -->
  <rect x="330" y="90" width="420" height="76" rx="38" fill="#f97316" opacity="0.12"/>
  <rect x="330" y="90" width="420" height="76" rx="38" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="540" y="140" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="48" fill="#f97316" text-anchor="middle" letter-spacing="6">FREE</text>

  <!-- Main headline -->
  <text x="540" y="240" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="90" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">24-HOUR AI</text>
  <text x="540" y="332" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="90" fill="#f97316" text-anchor="middle" letter-spacing="3">ASSESSMENT.</text>

  <!-- Rule -->
  <rect x="190" y="354" width="700" height="2" fill="#2e2e2e"/>

  <!-- Body -->
