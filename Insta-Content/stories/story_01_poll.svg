<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#232323"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#3a3a3a"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#dotGrid)" opacity="0.4"/>

  <!-- Orange glow blob top-center -->
  <ellipse cx="540" cy="700" rx="420" ry="320" fill="#f97316" opacity="0.06"/>

  <!-- Top safe zone: Instagram story header -->
  <rect x="0" y="0" width="1080" height="180" fill="#1a1a1a" opacity="0.95"/>

  <!-- Story progress bars -->
  <rect x="40" y="52" width="980" height="3" rx="2" fill="#3a3a3a"/>
  <rect x="40" y="52" width="420" height="3" rx="2" fill="#f97316"/>

  <!-- Profile avatar circle -->
  <circle cx="72" cy="110" r="34" fill="#2e2e2e" stroke="#f97316" stroke-width="2.5"/>
  <text x="72" y="117" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316" font-weight="bold">MC</text>

  <!-- Handle -->
  <text x="118" y="104" font-family="'DM Sans', system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8e8e8">maraponehq</text>
  <text x="118" y="130" font-family="'DM Sans', system-ui, sans-serif" font-size="22" fill="#a0a0a0">Marapone Contracting Inc.</text>

  <!-- Close X -->
  <text x="1020" y="118" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="32" fill="#a0a0a0">✕</text>

  <!-- MAIN QUESTION SECTION -->
  <!-- Small label -->
  <text x="540" y="310" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="24" fill="#f97316" letter-spacing="3">// POLL</text>

  <!-- Big question -->
  <text x="540" y="430" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="80" fill="#e8e8e8" letter-spacing="2">HOW LONG DOES</text>
  <text x="540" y="520" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="80" fill="#e8e8e8" letter-spacing="2">YOUR TEAM SPEND</text>
  <text x="540" y="610" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="80" fill="#e8e8e8" letter-spacing="2">REVIEWING</text>
  <text x="540" y="700" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="80" fill="#f97316" letter-spacing="2">BLUEPRINTS</text>
  <text x="540" y="790" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="80" fill="#e8e8e8" letter-spacing="2">PER PROJECT?</text>

  <!-- Decorative line -->
  <rect x="390" y="840" width="300" height="2" rx="1" fill="#3a3a3a"/>
  <rect x="490" y="838" width="100" height="6" rx="3" fill="#f97316"/>

  <!-- Poll boxes -->
  <!-- Box 1 -->
  <rect x="60" y="900" width="455" height="130" rx="16" fill="#2e2e2e" stroke="#f97316" stroke-width="2.5"/>
  <rect x="60" y="900" width="220" height="130" rx="16" fill="#f97316" opacity="0.18"/>
  <text x="287" y="978" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="46" fill="#e8e8e8" letter-spacing="2">UNDER 2 HOURS</text>
  <text x="287" y="1012" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="22" fill="#f97316">38% voted</text>

  <!-- Box 2 -->
  <rect x="565" y="900" width="455" height="130" rx="16" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="2.5"/>
  <rect x="565" y="900" width="370" height="130" rx="16" fill="#f97316" opacity="0.25"/>
  <text x="792" y="978" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="46" fill="#e8e8e8" letter-spacing="2">2+ HOURS</text>
  <text x="792" y="1012" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="22" fill="#f97316">62% voted</text>

  <!-- Poll note -->
  <text x="540" y="1090" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="26" fill="#a0a0a0">1,204 votes · 18 hours left</text>

  <!-- Divider -->
  <rect x="60" y="1150" width="960" height="1" fill="#3a3a3a"/>

  <!-- Solution text -->
  <text x="540" y="1240" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="38" fill="#e8e8e8" font-weight="600">We have a solution either way 👇</text>

  <!-- Bottom CTA card -->
  <rect x="60" y="1310" width="960" height="200" rx="20" fill="#2e2e2e" stroke="#f97316" stroke-width="2"/>

  <text x="540" y="1378" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#a0a0a0" letter-spacing="2">FREE FOR 24 HOURS</text>
  <text x="540" y="1436" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="58" fill="#f97316" letter-spacing="3">LINK IN BIO → FREE ASSESSMENT</text>
  <text x="540" y="1480" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="26" fill="#a0a0a0">marapone.com/contact</text>

  <!-- Bottom nav bar simulation -->
  <rect x="0" y="1820" width="1080" height="100" fill="#1a1a1a" opacity="0.98"/>
  <rect x="420" y="1870" width="240" height="4" rx="2" fill="#e8e8e8" opacity="0.4"/>

  <!-- @maraponehq watermark -->
  <text x="540" y="1800" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#3a3a3a">@maraponehq</text>
</svg>
