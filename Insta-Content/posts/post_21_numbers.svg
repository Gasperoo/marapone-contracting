  <line x1="1008" y1="72" x2="880" y2="72" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="1008" y1="72" x2="1008" y2="200" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="72" y1="1008" x2="200" y2="1008" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="72" y1="1008" x2="72" y2="880" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
