<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.055"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#232323"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#f97316"/>

  <!-- Top label -->
  <text x="36" y="72" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" letter-spacing="4">// CAROUSEL — SLIDE 1 OF 5</text>

  <!-- Main headline -->
  <text x="36" y="178" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="72" fill="#e8e8e8" letter-spacing="3">5 SIGNS YOUR BUSINESS</text>
  <text x="36" y="252" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="72" fill="#e8e8e8" letter-spacing="3">IS BLEEDING MONEY</text>
  <text x="36" y="326" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="72" fill="#f97316" letter-spacing="3">ON DOCUMENTS.</text>

  <!-- Orange rule -->
  <rect x="36" y="348" width="700" height="3" fill="#f97316" rx="1.5"/>

  <!-- Numbered list -->
  <!-- Item 1 -->
  <rect x="36" y="370" width="40" height="68" rx="4" fill="#f97316"/>
  <text x="56" y="412" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#1a1a1a" text-anchor="middle">1</text>
  <text x="96" y="400" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8" letter-spacing="0.3">Blueprint reviews taking</text>
  <text x="96" y="430" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8" letter-spacing="0.3">hours not minutes</text>

  <!-- Item 2 -->
  <rect x="36" y="458" width="40" height="68" rx="4" fill="#f97316" opacity="0.8"/>
  <text x="56" y="500" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#1a1a1a" text-anchor="middle">2</text>
  <text x="96" y="484" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8">RFIs sitting unanswered</text>
  <text x="96" y="516" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8">for days</text>

  <!-- Item 3 -->
  <rect x="36" y="546" width="40" height="68" rx="4" fill="#f97316" opacity="0.6"/>
  <text x="56" y="588" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#1a1a1a" text-anchor="middle">3</text>
  <text x="96" y="572" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8">Freight invoices going</text>
  <text x="96" y="604" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8">unchecked</text>

  <!-- Item 4 -->
  <rect x="36" y="634" width="40" height="68" rx="4" fill="#f97316" opacity="0.4"/>
  <text x="56" y="676" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#1a1a1a" text-anchor="middle">4</text>
  <text x="96" y="660" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8">Compliance errors only caught</text>
  <text x="96" y="692" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8">after filing</text>

  <!-- Item 5 -->
  <rect x="36" y="722" width="40" height="68" rx="4" fill="#f97316" opacity="0.25"/>
  <text x="56" y="764" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#e8e8e8" text-anchor="middle">5</text>
  <text x="96" y="748" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8">Your team is doing</text>
  <text x="96" y="780" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8">AI's job manually</text>

  <!-- Rule -->
  <rect x="36" y="818" width="1008" height="2" fill="#2e2e2e"/>

  <!-- Swipe CTA -->
  <rect x="36" y="840" width="930" height="80" rx="6" fill="#2e2e2e"/>
  <rect x="36" y="840" width="6" height="80" fill="#f97316" rx="3"/>
  <text x="72" y="876" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="4">→ SWIPE TO SEE THE FIX</text>
  <text x="72" y="906" font-family="'DM Mono', 'Courier New', monospace" font-size="14" fill="#a0a0a0" letter-spacing="2">5 SOLUTIONS. ONE SYSTEM. ZERO MONTHLY COST.</text>

  <!-- Handle + decorative dots for swipe -->
  <circle cx="820" cy="1020" r="8" fill="#f97316"/>
  <circle cx="848" cy="1020" r="6" fill="#2e2e2e" stroke="#a0a0a0" stroke-width="1.5"/>
  <circle cx="872" cy="1020" r="6" fill="#2e2e2e" stroke="#a0a0a0" stroke-width="1.5"/>
  <circle cx="896" cy="1020" r="6" fill="#2e2e2e" stroke="#a0a0a0" stroke-width="1.5"/>
  <circle cx="920" cy="1020" r="6" fill="#2e2e2e" stroke="#a0a0a0" stroke-width="1.5"/>
  <text x="1044" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
</svg>
