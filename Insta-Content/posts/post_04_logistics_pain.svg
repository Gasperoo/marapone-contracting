<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#1e1e1e"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Warning stripe bottom -->
  <rect x="0" y="1072" width="1080" height="8" fill="#f97316"/>

  <!-- Top label -->
  <text x="72" y="80" font-family="'DM Mono', 'Courier New', monospace" font-size="18" fill="#f97316" letter-spacing="4">// LOGISTICS INTELLIGENCE</text>

  <!-- Alert icon area -->
  <polygon points="72,130 120,130 96,100" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <text x="96" y="127" font-family="'DM Mono', 'Courier New', monospace" font-size="14" fill="#f97316" text-anchor="middle">!</text>

  <!-- Main headline -->
  <text x="140" y="120" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="56" fill="#e8e8e8" letter-spacing="2">YOUR FREIGHT INVOICES</text>
  <text x="140" y="176" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="56" fill="#f97316" letter-spacing="2">ARE BEING OVERBILLED.</text>

