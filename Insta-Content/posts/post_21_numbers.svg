  <text x="540" y="198" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="86" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">THE NUMBERS</text>
  <text x="540" y="280" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="86" fill="#f97316" text-anchor="middle" letter-spacing="3">BEHIND THE WORK.</text>

