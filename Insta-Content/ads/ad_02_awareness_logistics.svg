  <text x="540" y="924" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#1a1a1a" letter-spacing="2">FREE 24-HOUR TURNAROUND</text>
  <text x="540" y="976" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="58" fill="#1a1a1a" letter-spacing="3">START WITH A FREE ASSESSMENT →</text>

  <!-- URL underline -->
  <text x="540" y="1046" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="24" fill="#a0a0a0">marapone.com · @maraponehq</text>
