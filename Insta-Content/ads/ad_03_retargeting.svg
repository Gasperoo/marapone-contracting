<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1a18"/>
      <stop offset="100%" stop-color="#242220"/>
    </linearGradient>
    <radialGradient id="warmCenter" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ctaBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <pattern id="dotGrid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.2" fill="#3a3a3a"/>
    </pattern>
  </defs>

  <!-- Background - slightly warmer -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#dotGrid)" opacity="0.3"/>
  <ellipse cx="540" cy="480" rx="520" ry="380" fill="url(#warmCenter)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1080" height="80" fill="#1c1a18" opacity="0.9"/>
  <text x="54" y="50" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#f97316" letter-spacing="2">MARAPONE CONTRACTING</text>
  <text x="1026" y="50" text-anchor="end" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#a0a0a0">@maraponehq</text>
  <rect x="0" y="78" width="1080" height="2" fill="#f97316" opacity="0.4"/>

  <!-- Direct opener - personal -->
  <text x="54" y="184" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="102" fill="#e8e8e8" letter-spacing="2">YOU VISITED.</text>
  <text x="54" y="292" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="102" fill="#f97316" letter-spacing="2">YOU'RE CURIOUS.</text>

  <!-- Orange rule -->
  <rect x="54" y="316" width="300" height="4" rx="2" fill="#f97316"/>

  <!-- Body paragraph card -->
  <rect x="54" y="356" width="972" height="290" rx="16" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1.5"/>
  <rect x="54" y="356" width="6" height="290" rx="3" fill="#f97316" opacity="0.6"/>

  <text x="88" y="416" font-family="'DM Sans', system-ui, sans-serif" font-size="28" fill="#e8e8e8">Most construction and logistics teams that</text>
  <text x="88" y="456" font-family="'DM Sans', system-ui, sans-serif" font-size="28" fill="#e8e8e8">come to us say the same thing:</text>
  <text x="88" y="528" font-family="'DM Sans', system-ui, sans-serif" font-size="32" fill="#f97316" font-style="italic" font-weight="600">"I didn't think AI was for</text>
  <text x="88" y="572" font-family="'DM Sans', system-ui, sans-serif" font-size="32" fill="#f97316" font-style="italic" font-weight="600">companies like ours."</text>
  <text x="88" y="622" font-family="'DM Sans', system-ui, sans-serif" font-size="30" fill="#e8e8e8">It is. And we'll <tspan font-weight="700">prove it for free.</tspan></text>

  <!-- Two trust points -->
  <rect x="54" y="668" width="468" height="116" rx="14" fill="#232323" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="288" y="714" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#f97316">ASSESSMENT</text>
  <text x="288" y="758" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="48" fill="#e8e8e8">24 HOURS</text>

  <rect x="558" y="668" width="468" height="116" rx="14" fill="#232323" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="792" y="714" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#f97316">RISK</text>
  <text x="792" y="758" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="48" fill="#e8e8e8">ZERO</text>

  <!-- Bold CTA statement -->
  <text x="540" y="848" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="52" fill="#e8e8e8" letter-spacing="2">24-HOUR FREE ASSESSMENT.</text>
  <text x="540" y="900" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="52" fill="#f97316" letter-spacing="2">ZERO RISK.</text>

  <!-- CTA button -->
  <rect x="54" y="930" width="972" height="110" rx="18" fill="url(#ctaBtn)"/>
  <text x="540" y="1003" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="62" fill="#1a1a1a" letter-spacing="3">BOOK IT NOW → marapone.com/contact</text>
</svg>
