      <stop offset="100%" style="stop-color:#232323"/>
    </linearGradient>
    <linearGradient id="timeline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.8"/>
