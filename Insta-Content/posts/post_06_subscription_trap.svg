<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#222222"/>
    </linearGradient>
    <linearGradient id="burngrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Top gradient burn effect -->
  <rect x="0" y="0" width="1080" height="300" fill="url(#burngrad)"/>

  <!-- Top label -->
  <text x="72" y="76" font-family="'DM Mono', 'Courier New', monospace" font-size="18" fill="#f97316" letter-spacing="4">// THE SUBSCRIPTION TRAP</text>
  <rect x="72" y="86" width="400" height="2" fill="#f97316" opacity="0.3" rx="1"/>

  <!-- Main headline -->
  <text x="540" y="196" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="130" fill="#e8e8e8" text-anchor="middle" letter-spacing="4">THE</text>
  <text x="540" y="318" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="130" fill="#f97316" text-anchor="middle" letter-spacing="4">SUBSCRIPTION</text>
  <text x="540" y="440" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="130" fill="#e8e8e8" text-anchor="middle" letter-spacing="4">TRAP.</text>

  <!-- Cost calculator -->
  <rect x="72" y="468" width="936" height="220" rx="8" fill="#2e2e2e"/>
  <rect x="72" y="468" width="5" height="220" fill="#f97316" rx="3"/>
  <text x="110" y="512" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" letter-spacing="3">// COST CALCULATOR</text>

  <text x="110" y="552" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="26" fill="#a0a0a0">At</text>
  <text x="150" y="552" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="26" fill="#e8e8e8" font-weight="bold"> $299/month</text>
  <text x="418" y="552" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="26" fill="#a0a0a0">, that's</text>

  <text x="110" y="596" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="44" fill="#e8e8e8" letter-spacing="2">$3,588 / YEAR</text>
  <text x="450" y="596" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#a0a0a0">  →  12 months</text>

  <text x="110" y="642" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="44" fill="#e8e8e8" letter-spacing="2">$17,940 / 5 YEARS</text>
  <text x="550" y="642" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#a0a0a0">  →  60 months</text>

  <text x="110" y="676" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">For software you don't own.</text>

  <!-- Divider -->
  <rect x="72" y="716" width="936" height="2" fill="#232323"/>

  <!-- Marapone alternative -->
  <rect x="72" y="734" width="936" height="120" rx="8" fill="#1a1a1a"/>
  <rect x="72" y="734" width="6" height="120" fill="#f97316" rx="3"/>
  <text x="110" y="772" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0">Marapone: Pay once. Own forever.</text>
  <text x="110" y="826" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="80" fill="#f97316" letter-spacing="4">$0/MONTH.</text>
  <text x="710" y="826" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="52" fill="#e8e8e8" letter-spacing="2">FOREVER.</text>

  <!-- Bottom -->
  <rect x="72" y="882" width="936" height="2" fill="#2e2e2e"/>
  <text x="72" y="924" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#a0a0a0" letter-spacing="2">ONE-TIME INVESTMENT. PERMANENT CAPABILITY.</text>

  <!-- Handle -->
  <text x="1008" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
  <text x="72" y="1040" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#f97316" letter-spacing="2">MARAPONE.COM</text>

  <!-- Decorative cross shape -->
  <rect x="980" y="460" width="2" height="80" fill="#f97316" opacity="0.2" rx="1"/>
  <rect x="950" y="490" width="62" height="2" fill="#f97316" opacity="0.2" rx="1"/>
</svg>
