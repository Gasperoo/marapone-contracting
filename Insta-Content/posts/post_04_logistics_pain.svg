  <!-- Bottom info -->
  <text x="72" y="890" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">MARAPONE CONTRACTING INC.</text>
  <text x="72" y="914" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">PRIVATE AI — FREIGHT INVOICE AUDITOR</text>

  <!-- CTA -->
  <rect x="72" y="940" width="500" height="56" rx="4" fill="#f97316"/>
  <text x="322" y="975" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="30" fill="#1a1a1a" text-anchor="middle" letter-spacing="3">GET FREE ASSESSMENT</text>

  <!-- Handle -->
  <text x="1008" y="975" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
