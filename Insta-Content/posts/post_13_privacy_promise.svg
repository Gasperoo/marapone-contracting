<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <radialGradient id="shieldglow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>
  <rect width="1080" height="1080" fill="url(#shieldglow)"/>

  <!-- Bottom bar -->
  <rect x="0" y="1072" width="1080" height="8" fill="#f97316"/>

  <!-- Top label -->
  <text x="540" y="68" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="4">// PRIVACY PROMISE</text>

  <!-- Big shield outline -->
  <polygon points="540,100 720,145 720,280 540,340 360,280 360,145" fill="none" stroke="#f97316" stroke-width="2" opacity="0.2"/>
  <polygon points="540,115 705,157 705,275 540,328 375,275 375,157" fill="none" stroke="#f97316" stroke-width="1" opacity="0.1"/>

  <!-- Main headline -->
  <text x="540" y="424" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="68" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">WE'VE NEVER SEEN</text>
  <text x="540" y="498" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="68" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">YOUR DATA.</text>
  <text x="540" y="572" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="68" fill="#f97316" text-anchor="middle" letter-spacing="3">AND WE NEVER WILL.</text>

  <!-- Rule -->
  <rect x="190" y="592" width="700" height="2" fill="#2e2e2e"/>

  <!-- Body -->
  <text x="540" y="636" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">Once we deliver your system, it lives on your infrastructure.</text>
  <text x="540" y="664" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">We retain nothing. We have no backdoor.</text>
  <text x="540" y="692" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">No subscription means no reason to stay connected.</text>

  <!-- Three checkmarks -->
  <rect x="190" y="720" width="700" height="2" fill="#2e2e2e"/>

  <!-- Check 1 -->
  <circle cx="226" cy="779" r="22" fill="#f97316" opacity="0.15"/>
  <circle cx="226" cy="779" r="22" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="226" y="787" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="20" fill="#f97316" text-anchor="middle">✓</text>
  <text x="268" y="787" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#e8e8e8">Full source code delivered</text>

  <!-- Check 2 -->
  <circle cx="226" cy="845" r="22" fill="#f97316" opacity="0.15"/>
  <circle cx="226" cy="845" r="22" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="226" y="853" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="20" fill="#f97316" text-anchor="middle">✓</text>
  <text x="268" y="853" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#e8e8e8">Model weights transferred</text>

  <!-- Check 3 -->
  <circle cx="226" cy="911" r="22" fill="#f97316" opacity="0.15"/>
  <circle cx="226" cy="911" r="22" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="226" y="919" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="20" fill="#f97316" text-anchor="middle">✓</text>
  <text x="268" y="919" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#e8e8e8">Zero ongoing access required</text>

  <!-- Handle -->
  <text x="1008" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
  <text x="72" y="1040" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">MARAPONE.COM</text>
</svg>
