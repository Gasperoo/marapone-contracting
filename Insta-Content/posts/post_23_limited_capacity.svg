<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Left side bold bar -->
  <rect x="0" y="0" width="12" height="1080" fill="#f97316"/>

  <!-- Top label -->
  <text x="40" y="76" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" letter-spacing="4">// CAPACITY — NOTICE</text>
  <rect x="40" y="86" width="500" height="2" fill="#f97316" opacity="0.3"/>

  <!-- Availability indicator -->
  <rect x="40" y="116" width="220" height="36" rx="18" fill="#f97316" opacity="0.12"/>
  <rect x="40" y="116" width="220" height="36" rx="18" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="64" cy="134" r="6" fill="#22c55e"/>
  <text x="78" y="139" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="2">ACCEPTING CLIENTS</text>

  <!-- Main headline -->
  <text x="40" y="254" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="88" fill="#e8e8e8" letter-spacing="3">WE DON'T TAKE</text>
  <text x="40" y="342" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="88" fill="#e8e8e8" letter-spacing="3">ON MANY</text>
  <text x="40" y="430" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="88" fill="#f97316" letter-spacing="3">PROJECTS AT</text>
  <text x="40" y="518" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="88" fill="#f97316" letter-spacing="3">ONCE.</text>

  <!-- Intentional subtitle -->
  <text x="40" y="572" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="50" fill="#a0a0a0" letter-spacing="2">That's intentional.</text>

  <!-- Rule -->
  <rect x="40" y="596" width="700" height="2" fill="#2e2e2e"/>

  <!-- Body text -->
  <text x="40" y="646" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="23" fill="#a0a0a0">We're a small team that builds custom AI systems.</text>
  <text x="40" y="680" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="23" fill="#a0a0a0">Not a SaaS factory. Not an agency.</text>
  <text x="40" y="714" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="23" fill="#a0a0a0">We limit our engagements so every client gets</text>
  <text x="40" y="748" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="23" fill="#e8e8e8">our full attention.</text>

  <!-- Rule -->
  <rect x="40" y="780" width="700" height="2" fill="#2e2e2e"/>

  <!-- Urgency note -->
  <rect x="40" y="804" width="930" height="80" rx="6" fill="#2e2e2e"/>
  <rect x="40" y="804" width="6" height="80" fill="#f97316" rx="3"/>
  <text x="66" y="840" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#e8e8e8">If you're considering it —</text>
  <text x="66" y="870" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="28" fill="#f97316" letter-spacing="2">NOW IS THE RIGHT TIME TO REACH OUT.</text>

  <!-- CTA -->
  <rect x="40" y="914" width="600" height="72" rx="6" fill="#f97316"/>
  <text x="340" y="958" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#1a1a1a" text-anchor="middle" letter-spacing="3">MARAPONE.COM/CONTACT</text>

  <!-- Handle -->
  <text x="1044" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
</svg>
