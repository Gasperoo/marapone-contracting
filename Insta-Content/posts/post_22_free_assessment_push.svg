<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#232323"/>
    </linearGradient>
    <linearGradient id="ctabtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Top bar accent -->
  <rect x="0" y="0" width="1080" height="8" fill="#f97316"/>

  <!-- Bottom bar accent -->
  <rect x="0" y="1072" width="1080" height="8" fill="#f97316"/>

  <!-- Top label -->
  <text x="540" y="68" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="4">// WEEK 4 — CONVERSION</text>

  <!-- Main headline -->
  <text x="540" y="174" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="78" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">YOUR DOCUMENTS ARE</text>
  <text x="540" y="258" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="78" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">SITTING THERE.</text>
  <text x="540" y="358" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="78" fill="#f97316" text-anchor="middle" letter-spacing="3">LET AI REVIEW THEM.</text>

  <!-- Orange rule -->
  <rect x="190" y="380" width="700" height="3" fill="#f97316" rx="1.5"/>

  <!-- Body -->
  <text x="540" y="434" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8" text-anchor="middle">Send us a blueprint. A bill of lading.</text>
  <text x="540" y="468" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8" text-anchor="middle">An RFI log. We'll run a free 24-hour AI</text>
  <text x="540" y="502" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8" text-anchor="middle">assessment and show you exactly what</text>
  <text x="540" y="536" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#f97316" text-anchor="middle">your team is missing.</text>

  <!-- What we accept -->
  <rect x="190" y="566" width="700" height="2" fill="#2e2e2e"/>

  <text x="540" y="612" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" text-anchor="middle" letter-spacing="2">WE REVIEW:</text>

  <rect x="190" y="630" width="700" height="100" rx="6" fill="#2e2e2e"/>
  <text x="540" y="672" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">Blueprints  ·  Bills of Lading  ·  RFI Logs</text>
  <text x="540" y="706" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">Customs Docs  ·  Freight Invoices  ·  Compliance Files</text>

  <!-- CTA button -->
  <rect x="190" y="760" width="700" height="100" rx="8" fill="url(#ctabtn)"/>
  <text x="540" y="806" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="52" fill="#1a1a1a" text-anchor="middle" letter-spacing="4">GET YOUR FREE ASSESSMENT</text>
  <text x="540" y="844" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#1a1a1a" text-anchor="middle" letter-spacing="2">marapone.com/contact</text>

  <!-- Value reminder -->
  <text x="540" y="914" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">24-hour turnaround · Written report + video walkthrough</text>
  <text x="540" y="946" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle">No pitch · No obligation · Real results</text>

  <!-- Handle -->
  <text x="1008" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
</svg>
