<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <radialGradient id="quoteglow" cx="15%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>
  <rect width="1080" height="1080" fill="url(#quoteglow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#f97316"/>

  <!-- Stars -->
  <text x="540" y="82" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="36" fill="#f97316" text-anchor="middle">★★★★★</text>

  <!-- Top label -->
  <text x="540" y="130" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#a0a0a0" text-anchor="middle" letter-spacing="4">// CLIENT RESULT</text>

  <!-- Large quote marks -->
  <text x="48" y="300" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="280" fill="#f97316" opacity="0.15">"</text>

  <!-- Quote headline -->
  <text x="540" y="246" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="60" fill="#e8e8e8" text-anchor="middle" letter-spacing="2">WE CAUGHT A</text>
  <text x="540" y="318" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="90" fill="#f97316" text-anchor="middle" letter-spacing="3">$320,000</text>
  <text x="540" y="390" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="60" fill="#e8e8e8" text-anchor="middle" letter-spacing="2">COORDINATION ISSUE</text>
  <text x="540" y="446" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="60" fill="#e8e8e8" text-anchor="middle" letter-spacing="2">BEFORE BREAKING GROUND.</text>

  <!-- Rule -->
  <rect x="190" y="472" width="700" height="2" fill="#2e2e2e"/>

  <!-- Quote body -->
  <text x="540" y="522" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="21" fill="#a0a0a0" text-anchor="middle">"The blueprint auditor found a conflict between structural</text>
  <text x="540" y="552" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="21" fill="#a0a0a0" text-anchor="middle">and MEP drawings that would have cost us weeks and</text>
  <text x="540" y="582" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="21" fill="#a0a0a0" text-anchor="middle">six figures to fix mid-build."</text>

  <!-- Attribution card -->
  <rect x="190" y="624" width="700" height="110" rx="6" fill="#2e2e2e"/>
  <rect x="190" y="624" width="6" height="110" fill="#f97316" rx="3"/>
  <text x="216" y="664" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="24" fill="#e8e8e8" letter-spacing="2">GENERAL CONTRACTOR</text>
  <text x="216" y="696" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#f97316">$4.2M Commercial Project</text>
  <text x="216" y="720" font-family="'DM Mono', 'Courier New', monospace" font-size="14" fill="#a0a0a0" letter-spacing="1">Blueprint Auditor Module — Marapone Construction AI</text>

  <!-- Value stat -->
  <rect x="190" y="760" width="700" height="80" rx="6" fill="#f97316" opacity="0.08"/>
  <text x="540" y="794" font-family="'DM Mono', 'Courier New', monospace" font-size="14" fill="#f97316" text-anchor="middle" letter-spacing="3">ISSUE CAUGHT</text>
  <text x="540" y="824" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="28" fill="#f97316" text-anchor="middle" letter-spacing="2">BEFORE GROUND BROKE. SAVED $320K.</text>

  <!-- Handle -->
  <text x="1008" y="964" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
  <text x="36" y="964" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">MARAPONE.COM</text>
</svg>
