<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <radialGradient id="orangeglow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>
  <rect width="1080" height="1080" fill="url(#orangeglow)"/>

  <!-- Concentric circles for glow effect -->
  <circle cx="540" cy="480" r="380" fill="none" stroke="#f97316" stroke-width="1" opacity="0.04"/>
  <circle cx="540" cy="480" r="320" fill="none" stroke="#f97316" stroke-width="1" opacity="0.06"/>
  <circle cx="540" cy="480" r="260" fill="none" stroke="#f97316" stroke-width="1" opacity="0.08"/>

  <!-- Top label -->
  <text x="540" y="72" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="4">// CLIENT RESULTS</text>

  <!-- Massive number -->
  <text x="540" y="380" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="280" fill="#f97316" text-anchor="middle" letter-spacing="-5" filter="url(#glow)" opacity="0.9">$0.00</text>

  <!-- Subtitle under number -->
  <text x="540" y="446" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="60" fill="#e8e8e8" text-anchor="middle" letter-spacing="4">PER MONTH.</text>

  <!-- Rule -->
  <rect x="190" y="468" width="700" height="2" fill="#2e2e2e"/>

  <!-- Explanation -->
  <text x="540" y="526" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8" text-anchor="middle">That's what our clients pay in AI subscriptions</text>
  <text x="540" y="560" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="24" fill="#e8e8e8" text-anchor="middle">after working with us.</text>

  <text x="540" y="610" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="middle">Because they own their AI outright.</text>
  <text x="540" y="644" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="middle">The way it should be.</text>

  <!-- Three stat boxes -->
  <rect x="72" y="686" width="280" height="110" rx="6" fill="#2e2e2e"/>
  <text x="212" y="732" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="26" fill="#f97316" text-anchor="middle" letter-spacing="2">ONE-TIME</text>
  <text x="212" y="762" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0" text-anchor="middle">investment</text>
  <text x="212" y="782" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0" text-anchor="middle">starting $1,500 CAD</text>

  <rect x="400" y="686" width="280" height="110" rx="6" fill="#2e2e2e"/>
  <text x="540" y="732" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="26" fill="#f97316" text-anchor="middle" letter-spacing="2">PERMANENT</text>
  <text x="540" y="762" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0" text-anchor="middle">capability</text>
  <text x="540" y="782" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0" text-anchor="middle">that you own</text>

  <rect x="728" y="686" width="280" height="110" rx="6" fill="#2e2e2e"/>
  <text x="868" y="732" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="26" fill="#f97316" text-anchor="middle" letter-spacing="2">NO STRINGS</text>
  <text x="868" y="762" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0" text-anchor="middle">attached. ever.</text>
  <text x="868" y="782" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0" text-anchor="middle">zero ongoing cost</text>

  <!-- Bottom CTA -->
  <rect x="72" y="828" width="936" height="80" rx="6" fill="#f97316" opacity="0.1"/>
  <rect x="72" y="828" width="6" height="80" fill="#f97316" rx="3"/>
  <text x="110" y="864" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="32" fill="#e8e8e8" letter-spacing="2">Own your AI. Stop paying forever.</text>
  <text x="110" y="896" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" letter-spacing="2">MARAPONE.COM</text>

  <!-- Handle -->
  <text x="1008" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
</svg>
