  <text x="540" y="816" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="34" fill="#a0a0a0">Get a free 24-hour assessment</text>
  <text x="540" y="856" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="34" fill="#a0a0a0">of your documents.</text>

