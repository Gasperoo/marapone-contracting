  <rect x="72" y="210" width="936" height="100" rx="6" fill="#2e2e2e"/>
  <text x="540" y="255" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="72" fill="#f97316" text-anchor="middle" letter-spacing="3">12–15%</text>
  <text x="540" y="290" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="20" fill="#a0a0a0" text-anchor="middle" letter-spacing="1">of freight invoices are overpaid by the average importer</text>

  <!-- Three points with orange arrows -->
  <!-- Point 1 -->
  <rect x="72" y="336" width="920" height="100" rx="6" fill="#2e2e2e"/>
  <rect x="72" y="336" width="5" height="100" fill="#f97316" rx="3"/>
  <text x="110" y="370" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="32" fill="#f97316" letter-spacing="2">→ INCORRECT WEIGHT CLASSIFICATIONS</text>
  <text x="110" y="402" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Carrier billing errors that go unchallenged add up fast</text>
  <text x="950" y="388" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="28" fill="#f97316" opacity="0.3" text-anchor="middle">01</text>

  <!-- Point 2 -->
  <rect x="72" y="454" width="920" height="100" rx="6" fill="#2e2e2e"/>
  <rect x="72" y="454" width="5" height="100" fill="#f97316" rx="3"/>
  <text x="110" y="488" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="32" fill="#f97316" letter-spacing="2">→ DUPLICATE LINE ITEMS</text>
  <text x="110" y="520" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Billed twice for accessorials your team never catches</text>
  <text x="950" y="508" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="28" fill="#f97316" opacity="0.3" text-anchor="middle">02</text>

  <!-- Point 3 -->
  <rect x="72" y="572" width="920" height="100" rx="6" fill="#2e2e2e"/>
  <rect x="72" y="572" width="5" height="100" fill="#f97316" rx="3"/>
  <text x="110" y="606" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="32" fill="#f97316" letter-spacing="2">→ WRONG TRADE LANE RATES</text>
  <text x="110" y="638" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Applied at the wrong rate tier, never audited</text>
  <text x="950" y="622" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="28" fill="#f97316" opacity="0.3" text-anchor="middle">03</text>

  <!-- Insight box -->
  <rect x="72" y="700" width="936" height="120" rx="6" fill="#f97316" opacity="0.08"/>
  <rect x="72" y="700" width="6" height="120" fill="#f97316" rx="3"/>
  <text x="110" y="746" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="46" fill="#e8e8e8" letter-spacing="2">AI CATCHES WHAT</text>
  <text x="110" y="800" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="46" fill="#f97316" letter-spacing="2">SPREADSHEETS MISS.</text>

