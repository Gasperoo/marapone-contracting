<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#232323"/>
    </linearGradient>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#3a3a3a"/>
    </pattern>
    <linearGradient id="stepGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2e2e2e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#dotGrid)" opacity="0.35"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1080" height="180" fill="#1a1a1a" opacity="0.95"/>
  <rect x="40" y="52" width="980" height="3" rx="2" fill="#3a3a3a"/>
  <rect x="40" y="52" width="350" height="3" rx="2" fill="#f97316"/>

  <!-- Profile -->
  <circle cx="72" cy="110" r="34" fill="#2e2e2e" stroke="#f97316" stroke-width="2.5"/>
  <text x="72" y="117" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316">MC</text>
  <text x="118" y="104" font-family="'DM Sans', system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8e8e8">maraponehq</text>
  <text x="118" y="130" font-family="'DM Sans', system-ui, sans-serif" font-size="22" fill="#a0a0a0">Marapone Contracting Inc.</text>
  <text x="1020" y="118" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="32" fill="#a0a0a0">✕</text>

  <!-- Page title -->
  <text x="540" y="288" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="24" fill="#f97316" letter-spacing="3">// THE PROCESS</text>
  <text x="540" y="370" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#e8e8e8" letter-spacing="3">HOW IT WORKS</text>
  <text x="540" y="434" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#f97316" letter-spacing="3">IN 4 STEPS</text>

  <!-- Orange connecting line (vertical spine) -->
  <rect x="96" y="490" width="4" height="1020" rx="2" fill="#f97316" opacity="0.25"/>
  <!-- Line segments between steps -->
  <rect x="96" y="620" width="4" height="100" rx="2" fill="#f97316"/>
  <rect x="96" y="870" width="4" height="100" rx="2" fill="#f97316"/>
  <rect x="96" y="1120" width="4" height="100" rx="2" fill="#f97316"/>

  <!-- STEP 01 -->
  <circle cx="98" cy="510" r="22" fill="#f97316"/>
  <text x="98" y="517" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="20" fill="#1a1a1a">01</text>
  <rect x="140" y="472" width="890" height="175" rx="14" fill="#2e2e2e" stroke="#f97316" stroke-width="2"/>
  <rect x="140" y="472" width="890" height="175" rx="14" fill="url(#stepGlow)"/>
  <text x="174" y="530" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#f97316" letter-spacing="3">ASSESSMENT</text>
  <text x="174" y="578" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="50" fill="#e8e8e8" letter-spacing="2">SEND US YOUR DOCUMENTS.</text>
  <text x="174" y="622" font-family="'DM Sans', system-ui, sans-serif" font-size="28" fill="#a0a0a0">Free. Returned within 24 hours.</text>

  <!-- STEP 02 -->
  <circle cx="98" cy="760" r="22" fill="#f97316"/>
  <text x="98" y="767" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="20" fill="#1a1a1a">02</text>
  <rect x="140" y="722" width="890" height="175" rx="14" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="174" y="780" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#f97316" letter-spacing="3">DISCOVERY</text>
  <text x="174" y="828" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="50" fill="#e8e8e8" letter-spacing="2">WE SCOPE THE BUILD.</text>
  <text x="174" y="872" font-family="'DM Sans', system-ui, sans-serif" font-size="28" fill="#a0a0a0">Together. Based on your actual workflow.</text>

  <!-- STEP 03 -->
  <circle cx="98" cy="1010" r="22" fill="#f97316"/>
  <text x="98" y="1017" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="20" fill="#1a1a1a">03</text>
  <rect x="140" y="972" width="890" height="175" rx="14" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="174" y="1030" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#f97316" letter-spacing="3">BUILD</text>
  <text x="174" y="1078" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="50" fill="#e8e8e8" letter-spacing="2">FINE-TUNED AI. YOUR DATA.</text>
  <text x="174" y="1122" font-family="'DM Sans', system-ui, sans-serif" font-size="28" fill="#a0a0a0">Private deployment. No cloud sharing.</text>

  <!-- STEP 04 -->
  <circle cx="98" cy="1260" r="22" fill="#f97316"/>
  <text x="98" y="1267" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="20" fill="#1a1a1a">04</text>
  <rect x="140" y="1222" width="890" height="175" rx="14" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="174" y="1280" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#f97316" letter-spacing="3">OWN</text>
  <text x="174" y="1328" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="50" fill="#e8e8e8" letter-spacing="2">FULL HANDOVER.</text>
  <text x="174" y="1372" font-family="'DM Sans', system-ui, sans-serif" font-size="28" fill="#a0a0a0">Source code + model. Yours forever.</text>

  <!-- Bottom end dot -->
  <circle cx="98" cy="1510" r="12" fill="#3a3a3a" stroke="#f97316" stroke-width="2"/>

