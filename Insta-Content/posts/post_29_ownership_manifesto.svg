<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Minimal top and bottom bars -->
  <rect x="0" y="0" width="1080" height="6" fill="#f97316"/>
  <rect x="0" y="1074" width="1080" height="6" fill="#f97316"/>

  <!-- Side rules -->
  <rect x="72" y="72" width="2" height="936" fill="#f97316" opacity="0.2" rx="1"/>
  <rect x="1006" y="72" width="2" height="936" fill="#f97316" opacity="0.2" rx="1"/>

  <!-- Top label -->
  <text x="540" y="118" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="5">// THE MARAPONE WAY</text>

  <!-- Main headline -->
  <text x="540" y="218" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="100" fill="#e8e8e8" text-anchor="middle" letter-spacing="4">WE BELIEVE IN</text>
  <text x="540" y="318" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="100" fill="#f97316" text-anchor="middle" letter-spacing="4">OWNERSHIP.</text>

  <!-- Manifesto statements separated by orange rules -->
  <!-- Statement 1 -->
  <rect x="190" y="344" width="700" height="2" fill="#f97316" opacity="0.5"/>
  <text x="540" y="390" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="30" fill="#e8e8e8" text-anchor="middle" letter-spacing="0.5">You should own your tools.</text>

  <!-- Statement 2 -->
  <rect x="190" y="414" width="700" height="2" fill="#f97316" opacity="0.5"/>
  <text x="540" y="460" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="30" fill="#e8e8e8" text-anchor="middle" letter-spacing="0.5">Your data should stay on your server.</text>

  <!-- Statement 3 -->
  <rect x="190" y="484" width="700" height="2" fill="#f97316" opacity="0.5"/>
  <text x="540" y="530" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="30" fill="#e8e8e8" text-anchor="middle" letter-spacing="0.5">AI shouldn't cost you forever.</text>

  <!-- Statement 4 -->
  <rect x="190" y="554" width="700" height="2" fill="#f97316" opacity="0.5"/>
  <text x="540" y="600" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="30" fill="#e8e8e8" text-anchor="middle" letter-spacing="0.5">One-time work. Permanent results.</text>

  <!-- Statement 5 -->
  <rect x="190" y="624" width="700" height="2" fill="#f97316" opacity="0.7"/>
  <text x="540" y="682" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="52" fill="#f97316" text-anchor="middle" letter-spacing="3">That's the Marapone way.</text>
  <rect x="190" y="704" width="700" height="2" fill="#f97316" opacity="0.7"/>

  <!-- Central decorative element -->
  <circle cx="540" cy="790" r="60" fill="none" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <circle cx="540" cy="790" r="44" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.25"/>
  <text x="540" y="802" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="28" fill="#f97316" text-anchor="middle" letter-spacing="2">MCI</text>

  <!-- Tagline -->
  <text x="540" y="896" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#a0a0a0" text-anchor="middle" letter-spacing="3">STOP RENTING YOUR AI. OWN THE ENGINE.</text>

  <!-- Handle and URL -->
  <text x="1008" y="986" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
  <text x="72" y="986" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">MARAPONE.COM</text>
</svg>
