<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#232323"/>
    </linearGradient>
    <linearGradient id="flowline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Top header bar -->
  <rect x="0" y="0" width="1080" height="90" fill="#232323"/>
  <rect x="0" y="86" width="1080" height="4" fill="#f97316"/>
  <text x="540" y="52" font-family="'DM Mono', 'Courier New', monospace" font-size="18" fill="#f97316" text-anchor="middle" letter-spacing="4">// EDUCATION — HOW IT WORKS</text>

  <!-- Main headline -->
  <text x="540" y="170" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">HOW PRIVATE AI</text>
  <text x="540" y="248" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#f97316" text-anchor="middle" letter-spacing="3">ACTUALLY WORKS.</text>

  <!-- Flow diagram vertical line -->
  <rect x="537" y="278" width="6" height="610" fill="url(#flowline)" rx="3"/>

  <!-- Step 1 -->
  <circle cx="540" cy="320" r="30" fill="#f97316"/>
  <text x="540" y="330" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="32" fill="#1a1a1a" text-anchor="middle">1</text>
  <rect x="590" y="290" width="390" height="60" rx="6" fill="#2e2e2e"/>
  <text x="610" y="316" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316" letter-spacing="2">WE FINE-TUNE</text>
  <text x="610" y="340" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0">on your documents, your workflows</text>
  <!-- Left note -->
  <text x="486" y="316" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#a0a0a0" text-anchor="end" letter-spacing="1">STEP 01</text>

  <!-- Step 2 -->
  <circle cx="540" cy="460" r="30" fill="#f97316"/>
  <text x="540" y="470" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="32" fill="#1a1a1a" text-anchor="middle">2</text>
  <rect x="590" y="430" width="390" height="60" rx="6" fill="#2e2e2e"/>
  <text x="610" y="456" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316" letter-spacing="2">MODEL RUNS LOCALLY</text>
  <text x="610" y="480" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0">on your machine or server</text>
  <text x="486" y="456" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#a0a0a0" text-anchor="end" letter-spacing="1">STEP 02</text>

  <!-- Step 3 -->
  <circle cx="540" cy="600" r="30" fill="#f97316"/>
  <text x="540" y="610" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="32" fill="#1a1a1a" text-anchor="middle">3</text>
  <rect x="590" y="570" width="390" height="60" rx="6" fill="#2e2e2e"/>
  <text x="610" y="596" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316" letter-spacing="2">NO EXTERNAL CALLS</text>
  <text x="610" y="620" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0">ever made — zero data leaves</text>
  <text x="486" y="596" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#a0a0a0" text-anchor="end" letter-spacing="1">STEP 03</text>

  <!-- Step 4 -->
  <circle cx="540" cy="740" r="30" fill="#f97316"/>
  <text x="540" y="750" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="32" fill="#1a1a1a" text-anchor="middle">4</text>
  <rect x="590" y="710" width="390" height="60" rx="6" fill="#2e2e2e"/>
  <text x="610" y="736" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316" letter-spacing="2">YOU OWN IT ALL</text>
  <text x="610" y="760" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="17" fill="#a0a0a0">model weights + full source code</text>
  <text x="486" y="736" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#a0a0a0" text-anchor="end" letter-spacing="1">STEP 04</text>

  <!-- Bottom tagline -->
  <rect x="72" y="820" width="936" height="90" rx="6" fill="#2e2e2e"/>
  <rect x="72" y="820" width="6" height="90" fill="#f97316" rx="3"/>
  <text x="540" y="860" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="46" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">YOUR INTELLIGENCE.</text>
  <text x="540" y="898" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="46" fill="#f97316" text-anchor="middle" letter-spacing="3">YOUR INFRASTRUCTURE.</text>

  <!-- Handle -->
  <text x="1008" y="960" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
  <text x="72" y="960" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">MARAPONE.COM</text>
</svg>
