  <!-- Checkmark items -->
  <text x="130" y="1016" font-family="'DM Sans', system-ui, sans-serif" font-size="52" fill="#f97316">✓</text>
  <text x="200" y="1020" font-family="'DM Sans', system-ui, sans-serif" font-size="36" fill="#e8e8e8" font-weight="600">Written report</text>

  <text x="130" y="1096" font-family="'DM Sans', system-ui, sans-serif" font-size="52" fill="#f97316">✓</text>
  <text x="200" y="1100" font-family="'DM Sans', system-ui, sans-serif" font-size="36" fill="#e8e8e8" font-weight="600">Video walkthrough</text>

  <text x="130" y="1176" font-family="'DM Sans', system-ui, sans-serif" font-size="52" fill="#f97316">✓</text>
  <text x="200" y="1180" font-family="'DM Sans', system-ui, sans-serif" font-size="36" fill="#e8e8e8" font-weight="600">Zero obligation</text>

  <!-- Secondary points -->
  <rect x="80" y="1266" width="440" height="110" rx="12" fill="#232323"/>
  <text x="300" y="1312" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#a0a0a0">TURNAROUND</text>
  <text x="300" y="1354" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="48" fill="#f97316">24 HOURS</text>

  <rect x="560" y="1266" width="440" height="110" rx="12" fill="#232323"/>
  <text x="780" y="1312" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#a0a0a0">COST</text>
  <text x="780" y="1354" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="48" fill="#f97316">FREE</text>

  <!-- CTA button - large orange -->
  <rect x="60" y="1432" width="960" height="200" rx="24" fill="url(#ctaBtn)"/>
  <!-- Button shadow/depth -->
  <rect x="60" y="1618" width="960" height="14" rx="7" fill="#c2550e" opacity="0.5"/>
  <text x="540" y="1506" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="24" fill="#1a1a1a" letter-spacing="2">TAP TO START</text>
  <text x="540" y="1596" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="70" fill="#1a1a1a" letter-spacing="3">→ marapone.com/contact</text>

  <!-- Trust line -->
  <text x="540" y="1680" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="28" fill="#a0a0a0">21 clients. Private deployment. Full ownership.</text>

  <!-- Bottom nav -->
  <rect x="0" y="1820" width="1080" height="100" fill="#1a1a1a" opacity="0.98"/>
  <rect x="420" y="1870" width="240" height="4" rx="2" fill="#e8e8e8" opacity="0.4"/>

  <text x="540" y="1800" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#3a3a3a">@maraponehq</text>
</svg>
