  <text x="540" y="434" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="23" fill="#e8e8e8" text-anchor="middle">We send back a full written report</text>
  <text x="540" y="466" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="23" fill="#e8e8e8" text-anchor="middle">+ video walkthrough.</text>
  <text x="540" y="510" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="middle">No pitch. No obligation. Just answers.</text>

  <!-- Process flow -->
  <rect x="72" y="546" width="936" height="140" rx="8" fill="#2e2e2e"/>

  <!-- Step 1 -->
  <rect x="92" y="570" width="260" height="92" rx="6" fill="#232323"/>
  <text x="222" y="608" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316" text-anchor="middle" letter-spacing="2">SUBMIT</text>
  <text x="222" y="634" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="15" fill="#a0a0a0" text-anchor="middle">Upload your documents</text>
  <text x="222" y="652" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="15" fill="#a0a0a0" text-anchor="middle">to marapone.com/contact</text>

  <!-- Arrow -->
  <text x="400" y="626" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" text-anchor="middle">→</text>

  <!-- Step 2 -->
  <rect x="450" y="570" width="180" height="92" rx="6" fill="#232323"/>
  <text x="540" y="608" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316" text-anchor="middle" letter-spacing="2">CONFIRM</text>
  <text x="540" y="634" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="15" fill="#a0a0a0" text-anchor="middle">We review</text>
  <text x="540" y="652" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="15" fill="#a0a0a0" text-anchor="middle">&amp; confirm</text>

  <!-- Arrow -->
  <text x="680" y="626" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" text-anchor="middle">→</text>

  <!-- Step 3 -->
  <rect x="716" y="570" width="272" height="92" rx="6" fill="#232323"/>
  <text x="852" y="608" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="22" fill="#f97316" text-anchor="middle" letter-spacing="2">RECEIVE REPORT</text>
  <text x="852" y="634" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="15" fill="#a0a0a0" text-anchor="middle">Full written report</text>
  <text x="852" y="652" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="15" fill="#a0a0a0" text-anchor="middle">+ video walkthrough</text>

  <!-- Value props -->
  <text x="540" y="740" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="21" fill="#a0a0a0" text-anchor="middle">✓ Blueprints  ✓ Bills of Lading  ✓ RFI Logs  ✓ Customs Docs</text>

  <!-- CTA bar -->
  <rect x="72" y="780" width="936" height="100" rx="6" fill="url(#ctabar)"/>
  <text x="540" y="826" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="52" fill="#1a1a1a" text-anchor="middle" letter-spacing="4">GET YOUR FREE ASSESSMENT</text>
  <text x="540" y="864" font-family="'DM Mono', 'Courier New', monospace" font-size="18" fill="#1a1a1a" text-anchor="middle" letter-spacing="2">marapone.com/contact</text>

  <!-- Bottom note -->
  <text x="540" y="924" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0" text-anchor="middle">24-hour turnaround · No cost · No sales pitch</text>

  <!-- Handle -->
  <text x="1008" y="1040" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
</svg>
