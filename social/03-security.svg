<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
<defs>
  <style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');]]></style>
  <pattern id="d" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1.1" fill="#1d1d1d"/>
  </pattern>
  <!-- Subtle orange glow behind the statement -->
  <radialGradient id="glow" cx="50%" cy="45%" r="45%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="1080" height="1080" fill="#0d0d0d"/>
<rect width="1080" height="1080" fill="url(#d)"/>
<rect width="1080" height="1080" fill="url(#glow)"/>

<!-- Top bar -->
<rect width="1080" height="8" fill="#f97316"/>
<!-- Bottom bar -->
<rect y="1072" width="1080" height="8" fill="#f97316"/>

<!-- Corner brackets TL -->
<line x1="60" y1="60" x2="190" y2="60" stroke="#f97316" stroke-width="2" stroke-opacity="0.3"/>
<line x1="60" y1="60" x2="60" y2="190" stroke="#f97316" stroke-width="2" stroke-opacity="0.3"/>
<!-- TR -->
<line x1="890" y1="60" x2="1020" y2="60" stroke="#f97316" stroke-width="2" stroke-opacity="0.3"/>
<line x1="1020" y1="60" x2="1020" y2="190" stroke="#f97316" stroke-width="2" stroke-opacity="0.3"/>
<!-- BL -->
<line x1="60" y1="1020" x2="190" y2="1020" stroke="#f97316" stroke-width="2" stroke-opacity="0.3"/>
<line x1="60" y1="890" x2="60" y2="1020" stroke="#f97316" stroke-width="2" stroke-opacity="0.3"/>
<!-- BR -->
<line x1="890" y1="1020" x2="1020" y2="1020" stroke="#f97316" stroke-width="2" stroke-opacity="0.3"/>
<line x1="1020" y1="890" x2="1020" y2="1020" stroke="#f97316" stroke-width="2" stroke-opacity="0.3"/>

<!-- Label -->
<text x="540" y="112"
  font-family="'DM Mono', monospace"
  font-size="15" fill="#f97316" text-anchor="middle" letter-spacing="5">// DATA &amp; SECURITY //</text>

<!-- 3-line statement headline -->
<text x="540" y="242"
  font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
  font-size="130" fill="#e8e8e8" text-anchor="middle" letter-spacing="5">YOUR DATA</text>

<text x="540" y="382"
  font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
  font-size="130" fill="#e8e8e8" text-anchor="middle" letter-spacing="4">NEVER LEAVES</text>

<text x="540" y="516"
  font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
  font-size="130" fill="#f97316" text-anchor="middle" letter-spacing="3">YOUR BUILDING.</text>

<!-- Subtext -->
<text x="540" y="577"
  font-family="'DM Sans', Arial, sans-serif"
  font-size="22" fill="#585858" text-anchor="middle">Once your system is built, it runs on your hardware only.</text>
<text x="540" y="606"
  font-family="'DM Sans', Arial, sans-serif"
  font-size="22" fill="#585858" text-anchor="middle">No outbound connections. No cloud dependency. No back door.</text>

<!-- Divider -->
<rect x="290" y="632" width="500" height="2" fill="#f97316" rx="1" fill-opacity="0.4"/>

<!-- 2x2 grid of security points -->
<!-- Row 1, Left card -->
<rect x="96" y="654" width="408" height="68" rx="6" fill="#161616" stroke="#252525" stroke-width="1"/>
<text x="300" y="694"
  font-family="'DM Mono', monospace"
  font-size="17" fill="#f97316" text-anchor="middle" letter-spacing="1">✓  LOCAL-ONLY PROCESSING</text>

<!-- Row 1, Right card -->
<rect x="576" y="654" width="408" height="68" rx="6" fill="#161616" stroke="#252525" stroke-width="1"/>
<text x="780" y="694"
  font-family="'DM Mono', monospace"
  font-size="17" fill="#f97316" text-anchor="middle" letter-spacing="1">✓  ZERO POST-HANDOVER ACCESS</text>

<!-- Row 2, Left card -->
<rect x="96" y="736" width="408" height="68" rx="6" fill="#161616" stroke="#252525" stroke-width="1"/>
<text x="300" y="776"
  font-family="'DM Mono', monospace"
  font-size="17" fill="#f97316" text-anchor="middle" letter-spacing="1">✓  NO CLOUD DEPENDENCY</text>

<!-- Row 2, Right card -->
<rect x="576" y="736" width="408" height="68" rx="6" fill="#161616" stroke="#252525" stroke-width="1"/>
<text x="780" y="776"
  font-family="'DM Mono', monospace"
  font-size="17" fill="#f97316" text-anchor="middle" letter-spacing="1">✓  AIR-GAPPED AVAILABLE</text>

<!-- Logo wordmark -->
<text x="540" y="904"
  font-family="'Bebas Neue', Impact, sans-serif"
  font-size="58" fill="#e2e2e2" text-anchor="middle" letter-spacing="8">MARA<tspan fill="#f97316">PONE</tspan></text>
<text x="540" y="934"
  font-family="'DM Mono', monospace"
  font-size="13" fill="#3a3a3a" text-anchor="middle" letter-spacing="5">CONTRACTING INC.</text>

<!-- Thin rule -->
<rect x="430" y="954" width="220" height="1" fill="#252525"/>

<!-- URL -->
<text x="540" y="991"
  font-family="'DM Mono', monospace"
  font-size="20" fill="#f97316" text-anchor="middle" letter-spacing="2">marapone.com</text>

<!-- Locations -->
<text x="540" y="1026"
  font-family="'DM Mono', monospace"
  font-size="13" fill="#333333" text-anchor="middle" letter-spacing="4">TORONTO · ROME</text>

</svg>
