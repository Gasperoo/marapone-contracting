  <rect x="80" y="390" width="920" height="3" rx="1.5" fill="#f97316"/>
  <text x="540" y="448" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="26" fill="#a0a0a0" letter-spacing="8">CONTRACTING INC.</text>
  <text x="540" y="498" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#3a3a3a" letter-spacing="4">@maraponehq · marapone.com</text>

  <!-- Main CTA question -->
  <text x="540" y="630" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="96" fill="#e8e8e8" letter-spacing="2">READY TO</text>
  <text x="540" y="730" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="96" fill="#f97316" letter-spacing="2">OWN YOUR AI?</text>

