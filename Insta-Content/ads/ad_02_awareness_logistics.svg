  <text x="54" y="280" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="88" fill="#e8e8e8" letter-spacing="2">CHECKING</text>
  <text x="54" y="374" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="88" fill="#f97316" letter-spacing="2">FREIGHT INVOICES?</text>

  <!-- Sub -->
  <text x="54" y="428" font-family="'DM Sans', system-ui, sans-serif" font-size="27" fill="#a0a0a0">AI catches overcharges, compliance errors, and document</text>
  <text x="54" y="462" font-family="'DM Sans', system-ui, sans-serif" font-size="27" fill="#a0a0a0">gaps in minutes — not days.</text>

  <!-- Orange divider -->
  <rect x="54" y="490" width="140" height="4" rx="2" fill="#f97316"/>

  <!-- Stats grid - 2x2 -->
  <rect x="54" y="520" width="468" height="144" rx="14" fill="#2e2e2e" stroke="#f97316" stroke-width="2"/>
  <text x="288" y="572" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="21" fill="#f97316" letter-spacing="1">AVG. OVERBILLING RATE</text>
  <text x="288" y="638" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="68" fill="#e8e8e8">12–15%</text>

  <rect x="558" y="520" width="468" height="144" rx="14" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="792" y="572" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="21" fill="#f97316" letter-spacing="1">AI REVIEW TIME</text>
  <text x="792" y="638" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="68" fill="#e8e8e8">UNDER 2 HRS</text>

  <rect x="54" y="682" width="468" height="144" rx="14" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="288" y="734" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="21" fill="#f97316" letter-spacing="1">COST TO GET STARTED</text>
  <text x="288" y="800" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="68" fill="#e8e8e8">$1,500 CAD</text>

  <rect x="558" y="682" width="468" height="144" rx="14" fill="#2e2e2e" stroke="#f97316" stroke-width="2"/>
  <text x="792" y="734" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="21" fill="#f97316" letter-spacing="1">MONTHLY SUBSCRIPTION</text>
  <text x="792" y="800" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="68" fill="#f97316">$0.00</text>

  <!-- CTA Button -->
