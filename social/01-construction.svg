<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
<defs>
  <style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');]]></style>
  <pattern id="d" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1.1" fill="#1f1f1f"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="1080" height="1080" fill="#111111"/>
<rect width="1080" height="1080" fill="url(#d)"/>

<!-- Top bar -->
<rect width="1080" height="8" fill="#f97316"/>
<!-- Bottom bar -->
<rect y="1072" width="1080" height="8" fill="#f97316"/>

<!-- Corner brackets TL -->
<line x1="60" y1="60" x2="190" y2="60" stroke="#f97316" stroke-width="2" stroke-opacity="0.35"/>
<line x1="60" y1="60" x2="60" y2="190" stroke="#f97316" stroke-width="2" stroke-opacity="0.35"/>
<!-- TR -->
<line x1="890" y1="60" x2="1020" y2="60" stroke="#f97316" stroke-width="2" stroke-opacity="0.35"/>
<line x1="1020" y1="60" x2="1020" y2="190" stroke="#f97316" stroke-width="2" stroke-opacity="0.35"/>
<!-- BL -->
<line x1="60" y1="1020" x2="190" y2="1020" stroke="#f97316" stroke-width="2" stroke-opacity="0.35"/>
<line x1="60" y1="890" x2="60" y2="1020" stroke="#f97316" stroke-width="2" stroke-opacity="0.35"/>
<!-- BR -->
<line x1="890" y1="1020" x2="1020" y2="1020" stroke="#f97316" stroke-width="2" stroke-opacity="0.35"/>
<line x1="1020" y1="890" x2="1020" y2="1020" stroke="#f97316" stroke-width="2" stroke-opacity="0.35"/>

<!-- Category label -->
<text x="540" y="118"
  font-family="'DM Mono', 'Courier New', monospace"
  font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="5">// CONSTRUCTION AI //</text>

<!-- Headline line 1 -->
<text x="540" y="278"
  font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
  font-size="165" fill="#e8e8e8" text-anchor="middle" letter-spacing="6">BLUEPRINT</text>

<!-- Headline line 2 -->
<text x="540" y="415"
  font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
  font-size="124" fill="#f97316" text-anchor="middle" letter-spacing="4">INTELLIGENCE</text>

<!-- Subhead -->
<text x="540" y="474"
  font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
  font-size="22" fill="#686868" text-anchor="middle">Private AI. Installed on-site. Your documents, your hardware.</text>

<!-- Accent divider -->
<rect x="290" y="500" width="500" height="2" fill="#f97316" rx="1" fill-opacity="0.5"/>

<!-- Feature Card 1 -->
<rect x="160" y="522" width="760" height="82" rx="6" fill="#181818" stroke="#282828" stroke-width="1"/>
<text x="208" y="569"
  font-family="'DM Mono', monospace" font-size="22" fill="#f97316">✓</text>
<text x="248" y="563"
  font-family="'DM Sans', Arial, sans-serif" font-size="21" font-weight="600" fill="#e2e2e2">Blueprint Auditing</text>
<text x="248" y="587"
  font-family="'DM Sans', Arial, sans-serif" font-size="16" fill="#555555">Catch spec conflicts and missing callouts before they cost you</text>

<!-- Feature Card 2 -->
<rect x="160" y="616" width="760" height="82" rx="6" fill="#181818" stroke="#282828" stroke-width="1"/>
<text x="208" y="663"
  font-family="'DM Mono', monospace" font-size="22" fill="#f97316">✓</text>
<text x="248" y="657"
  font-family="'DM Sans', Arial, sans-serif" font-size="21" font-weight="600" fill="#e2e2e2">RFI Intelligence</text>
<text x="248" y="681"
  font-family="'DM Sans', Arial, sans-serif" font-size="16" fill="#555555">Surface answers from your own documents — before the site call</text>

<!-- Feature Card 3 -->
<rect x="160" y="710" width="760" height="82" rx="6" fill="#181818" stroke="#282828" stroke-width="1"/>
<text x="208" y="757"
  font-family="'DM Mono', monospace" font-size="22" fill="#f97316">✓</text>
<text x="248" y="751"
  font-family="'DM Sans', Arial, sans-serif" font-size="21" font-weight="600" fill="#e2e2e2">Daily Log Synthesis</text>
<text x="248" y="775"
  font-family="'DM Sans', Arial, sans-serif" font-size="16" fill="#555555">Turn field notes into structured reports — automatically</text>

<!-- Logo wordmark -->
<text x="540" y="904"
  font-family="'Bebas Neue', Impact, sans-serif"
  font-size="58" fill="#e2e2e2" text-anchor="middle" letter-spacing="8">MARA<tspan fill="#f97316">PONE</tspan></text>
<text x="540" y="934"
  font-family="'DM Mono', monospace"
  font-size="13" fill="#3e3e3e" text-anchor="middle" letter-spacing="5">CONTRACTING INC.</text>

<!-- Thin rule -->
<rect x="430" y="954" width="220" height="1" fill="#2a2a2a"/>

<!-- URL -->
<text x="540" y="991"
  font-family="'DM Mono', monospace"
  font-size="20" fill="#f97316" text-anchor="middle" letter-spacing="2">marapone.com</text>

<!-- Locations -->
<text x="540" y="1026"
  font-family="'DM Mono', monospace"
  font-size="13" fill="#3a3a3a" text-anchor="middle" letter-spacing="4">TORONTO · ROME</text>

</svg>
