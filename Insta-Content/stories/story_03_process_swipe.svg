  <text x="540" y="1624" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#1a1a1a" letter-spacing="2">START WITH STEP 01</text>
  <text x="540" y="1688" text-anchor="middle" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="54" fill="#1a1a1a" letter-spacing="3">FREE ASSESSMENT →</text>

  <!-- URL -->
  <text x="540" y="1762" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="26" fill="#a0a0a0">marapone.com</text>

  <!-- Bottom nav -->
  <rect x="0" y="1820" width="1080" height="100" fill="#1a1a1a" opacity="0.98"/>
  <rect x="420" y="1870" width="240" height="4" rx="2" fill="#e8e8e8" opacity="0.4"/>

  <text x="540" y="1800" text-anchor="middle" font-family="'DM Mono', 'Courier New', monospace" font-size="22" fill="#3a3a3a">@maraponehq</text>
</svg>
