<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#1e1e1e"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dotgrid)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1080" height="8" fill="#f97316"/>

  <!-- Top label -->
  <text x="540" y="68" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#f97316" text-anchor="middle" letter-spacing="4">// CONSTRUCTION AI SUITE</text>

  <!-- Main headline -->
  <text x="540" y="150" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">WHAT YOUR</text>
  <text x="540" y="226" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#f97316" text-anchor="middle" letter-spacing="3">CONSTRUCTION AI</text>
  <text x="540" y="302" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="76" fill="#e8e8e8" text-anchor="middle" letter-spacing="3">DOES.</text>

  <!-- Orange rule -->
  <rect x="190" y="320" width="700" height="3" fill="#f97316" rx="1.5"/>

  <!-- 4 module cards in 2x2 grid -->
  <!-- Card 1: Blueprint Auditor -->
  <rect x="72" y="346" width="444" height="200" rx="8" fill="#2e2e2e"/>
  <rect x="72" y="346" width="444" height="200" rx="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="72" y="346" width="6" height="200" fill="#f97316" rx="4"/>
  <rect x="90" y="366" width="160" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="170" y="386" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">MODULE 01</text>
  <text x="100" y="424" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="2">BLUEPRINT AUDITOR</text>
  <text x="100" y="455" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Catches scope gaps before</text>
  <text x="100" y="478" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">you bid. Every time.</text>
  <text x="100" y="522" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="1">→ Spec conflict detection</text>

  <!-- Card 2: RFI Intelligence -->
  <rect x="564" y="346" width="444" height="200" rx="8" fill="#2e2e2e"/>
  <rect x="564" y="346" width="444" height="200" rx="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="564" y="346" width="6" height="200" fill="#f97316" rx="4"/>
  <rect x="582" y="366" width="140" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="652" y="386" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">MODULE 02</text>
  <text x="592" y="424" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="2">RFI INTELLIGENCE</text>
  <text x="592" y="455" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Clears backlogs in hours,</text>
  <text x="592" y="478" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">not weeks.</text>
  <text x="592" y="522" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="1">→ Auto-draft responses</text>

  <!-- Card 3: Daily Log Synthesis -->
  <rect x="72" y="564" width="444" height="200" rx="8" fill="#2e2e2e"/>
  <rect x="72" y="564" width="444" height="200" rx="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="72" y="564" width="6" height="200" fill="#f97316" rx="4"/>
  <rect x="90" y="584" width="180" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="180" y="604" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">MODULE 03</text>
  <text x="100" y="642" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="2">DAILY LOG SYNTHESIS</text>
  <text x="100" y="673" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Auto-generates weekly</text>
  <text x="100" y="696" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">progress reports.</text>
  <text x="100" y="740" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="1">→ Narrative from raw logs</text>

  <!-- Card 4: Risk & Delay Signals -->
  <rect x="564" y="564" width="444" height="200" rx="8" fill="#2e2e2e"/>
  <rect x="564" y="564" width="444" height="200" rx="8" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="564" y="564" width="6" height="200" fill="#f97316" rx="4"/>
  <rect x="582" y="584" width="200" height="28" rx="14" fill="#f97316" opacity="0.15"/>
  <text x="682" y="604" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#f97316" text-anchor="middle" letter-spacing="2">MODULE 04</text>
  <text x="592" y="642" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#f97316" letter-spacing="2">RISK &amp; DELAY SIGNALS</text>
  <text x="592" y="673" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">Flags issues before they</text>
  <text x="592" y="696" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#a0a0a0">cost you money.</text>
  <text x="592" y="740" font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#e8e8e8" letter-spacing="1">→ Early warning system</text>

  <!-- Bottom tagline -->
  <rect x="72" y="798" width="936" height="100" rx="6" fill="#232323"/>
  <rect x="72" y="798" width="6" height="100" fill="#f97316" rx="3"/>
  <text x="540" y="838" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#e8e8e8" text-anchor="middle" letter-spacing="2">BUILT FOR GCs.</text>
  <text x="540" y="880" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="middle">By people who know what happens on sites.</text>

  <!-- Handle -->
  <text x="1008" y="948" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
  <text x="72" y="948" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">MARAPONE.COM</text>
</svg>
