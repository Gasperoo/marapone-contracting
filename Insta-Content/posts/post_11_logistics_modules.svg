  <text x="540" y="838" font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif" font-size="36" fill="#e8e8e8" text-anchor="middle" letter-spacing="2">BUILT FOR IMPORTERS.</text>
  <text x="540" y="880" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="middle">By people who know what happens in trade.</text>

  <!-- Handle -->
  <text x="1008" y="948" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-size="22" fill="#a0a0a0" text-anchor="end" letter-spacing="1">@maraponehq</text>
  <text x="72" y="948" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#a0a0a0" letter-spacing="2">MARAPONE.COM</text>
</svg>
